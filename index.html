  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #F5F3EF;
      --fg:       #0F0D0B;
      --mid:      #7A7370;
      --border:   rgba(15, 13, 11, 0.1);
      --card-bg:  #FFFFFF;
      --strip-h:  130px;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: 'Inter', sans-serif;
      min-height: 100dvh;
      overflow-x: hidden;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── PHOTO STRIPS ──────────────────────────── */
    .strips {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 0;
      overflow: hidden;
      opacity: 0;
      animation: fade-in 0.8s ease 0.1s forwards;
    }

    .strip-row {
      display: flex;
      width: 100%;
      overflow: hidden;
    }

    .strip-track {
      display: flex;
      gap: 6px;
      will-change: transform;
    }

    .strip-row:nth-child(1) .strip-track {
      animation: scroll-left 28s linear infinite;
    }
    .strip-row:nth-child(2) .strip-track {
      animation: scroll-right 22s linear infinite;
    }
    .strip-row:nth-child(3) .strip-track {
      animation: scroll-left 32s linear infinite;
    }
    .strip-row:nth-child(4) .strip-track {
      animation: scroll-right 24s linear infinite;
    }

    .strip-track img {
      height: var(--strip-h);
      width: var(--strip-h);
      object-fit: cover;
      flex-shrink: 0;
      display: block;
    }

    @keyframes scroll-left {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }
    @keyframes scroll-right {
      0%   { transform: translateX(-50%); }
      100% { transform: translateX(0); }
    }

    /* ── MAIN CONTAINER ────────────────────────── */
    .container {
      max-width: 430px;
      margin: 0 auto;
      padding: 36px 20px 48px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* hide extra rows on mobile */
    .desktop-only { display: none; }

    /* ── DESKTOP LAYOUT ────────────────────────── */
    @media (min-width: 768px) {
      .desktop-only { display: flex; }

      body {
        display: grid;
        grid-template-columns: 1fr 1fr;
        min-height: 100vh;
        overflow: hidden;
      }

      .strips {
        position: sticky;
        top: 0;
        height: 100vh;
        gap: 5px;
      }

      .strip-row {
        flex: 1;
        height: auto;
      }

      .strip-track img {
        height: 100%;
        width: auto;
        min-width: 200px;
        aspect-ratio: 1 / 1;
      }

      .container {
        height: 100vh;
        overflow-y: auto;
        margin: 0;
        max-width: none;
        padding: 48px 56px;
        justify-content: center;
        scrollbar-width: none;
      }

      .container::-webkit-scrollbar { display: none; }
    }

    /* ── BRAND HEADER ──────────────────────────── */
    .brand-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 36px;
      opacity: 0;
      animation: slide-up 0.7s ease 0.3s forwards;
    }

    .logo-circle {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      overflow: hidden;
      background: #EDE9E1;
      border: 1.5px solid var(--border);
      margin-bottom: 16px;
    }

    .logo-circle img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .brand-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      font-weight: 400;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--fg);
      margin-bottom: 6px;
    }

    .brand-tagline {
      font-size: 10px;
      font-weight: 300;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--mid);
      font-style: italic;
      font-family: 'Cormorant Garamond', serif;
    }

    /* ── LINKS ─────────────────────────────────── */
    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .link-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 18px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      text-decoration: none;
      color: var(--fg);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      opacity: 0;
    }

    .link-item:nth-child(1) { animation: slide-up 0.5s ease 0.45s forwards; }
    .link-item:nth-child(2) { animation: slide-up 0.5s ease 0.52s forwards; }
    .link-item:nth-child(3) { animation: slide-up 0.5s ease 0.59s forwards; }
    .link-item:nth-child(4) { animation: slide-up 0.5s ease 0.66s forwards; }
    .link-item:nth-child(5) { animation: slide-up 0.5s ease 0.73s forwards; }
    .link-item:nth-child(6) { animation: slide-up 0.5s ease 0.80s forwards; }
    .link-item:nth-child(7) { animation: slide-up 0.5s ease 0.87s forwards; }

    .link-item:active {
      transform: scale(0.985);
      box-shadow: none;
    }

    @media (hover: hover) {
      .link-item:hover {
        transform: translateY(-1px);
        box-shadow: 0 4px 16px rgba(15, 13, 11, 0.08);
      }
    }

    .link-left {
      display: flex;
      align-items: center;
      gap: 13px;
    }

    .link-icon {
      width: 17px;
      height: 17px;
      fill: var(--fg);
      opacity: 0.45;
      flex-shrink: 0;
    }

    .link-name {
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--fg);
    }

    .link-arrow {
      font-size: 14px;
      color: var(--mid);
    }

    /* Featured link (own website) */
    .link-item.featured {
      background: var(--fg);
      border-color: var(--fg);
    }

    .link-item.featured .link-name,
    .link-item.featured .link-arrow {
      color: var(--bg);
    }

    .link-item.featured .link-icon {
      fill: var(--bg);
      opacity: 0.8;
    }

    .link-item.featured:active {
      background: #2A2620;
    }

    /* ── FOOTER ────────────────────────────────── */
    .footer-sep {
      width: 24px;
      height: 1px;
      background: var(--border);
      margin: 32px 0 16px;
    }

    footer {
      font-size: 9px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--mid);
      opacity: 0.6;
    }

    /* ── KEYFRAMES ─────────────────────────────── */
    @keyframes fade-in {
      to { opacity: 1; }
    }

    @keyframes slide-up {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
